<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔔 Notifications — Dental Workflow</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .notification-item {
      display: flex;
      gap: 0.75rem;
      padding: 0.85rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid var(--color-border);
    }
    .notification-item:hover { background: var(--color-light); }
    .notification-item.unread { background: #eff6ff; border-color: #bfdbfe; }
    .notification-item .notif-icon { font-size: 1.5rem; min-width: 36px; text-align: center; }
    .notification-item .notif-content { flex: 1; }
    .notification-item .notif-title { font-weight: 600; font-size: 0.9rem; }
    .notification-item .notif-message { font-size: 0.82rem; color: var(--color-muted); }
    .notification-item .notif-time { font-size: 0.72rem; color: var(--color-muted); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="dashboard.html" class="brand">🦷 Dental Workflow</a>
      <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">☰</button>
      <div class="nav-links" id="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="wallet.html">Wallet</a>
        <button class="notification-bell" onclick="window.location.href='notifications.html'">
          🔔
          <span class="badge-dot"></span>
        </button>
      </div>
      <div class="user-menu">
        <span class="user-name">User</span>
        <button class="btn-logout">Logout</button>
      </div>
    </div>
  </nav>

  <main class="page-container" style="max-width:680px;">
    <div class="page-header">
      <h1>🔔 Notifications</h1>
      <button class="secondary" id="btn-mark-all" onclick="markAllRead()" style="font-size:0.85rem;">Mark All Read</button>
    </div>

    <div id="notif-list">
      <p style="color:var(--color-muted);">Loading notifications...</p>
    </div>

    <div id="notif-empty" class="empty-state d-none">
      <div class="icon">🔔</div>
      <h3>No notifications</h3>
      <p>You're all caught up!</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/i18n.js"></script>

  <script>
    var currentUser = null;

    async function loadNotifications() {
      var notifs = await getNotifications(currentUser.id, 50);
      var container = document.getElementById('notif-list');
      var empty = document.getElementById('notif-empty');

      if (notifs.length === 0) {
        container.innerHTML = '';
        empty.classList.remove('d-none');
        return;
      }

      empty.classList.add('d-none');
      container.innerHTML = notifs.map(function(n) {
        var icon = '📋';
        if (n.type.indexOf('submitted') !== -1) icon = '📤';
        if (n.type.indexOf('assigned') !== -1) icon = '📋';
        if (n.type.indexOf('approved') !== -1) icon = '✅';
        if (n.type.indexOf('rejected') !== -1) icon = '❌';
        if (n.type.indexOf('dispute') !== -1) icon = '⚠️';
        if (n.type.indexOf('overdue') !== -1) icon = '⏰';
        if (n.type.indexOf('revision') !== -1) icon = '🔄';
        if (n.type.indexOf('payment') !== -1 || n.type.indexOf('earning') !== -1) icon = '💰';

        var unreadClass = n.is_read ? '' : 'unread';

        return '<div class="notification-item ' + unreadClass + '" onclick="openNotif(\'' + n.id + '\', \'' + (n.case_id || '') + '\')">' +
          '<div class="notif-icon">' + icon + '</div>' +
          '<div class="notif-content">' +
            '<div class="notif-title">' + n.title + '</div>' +
            '<div class="notif-message">' + n.message + '</div>' +
            '<div class="notif-time">' + formatTime(n.created_at) + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    window.openNotif = async function(notifId, caseId) {
      await markNotificationRead(notifId);
      if (caseId) {
        window.location.href = 'case-detail.html?id=' + caseId;
      } else {
        await loadNotifications();
        await updateNotificationBadge();
      }
    };

    window.markAllRead = async function() {
      await markAllNotificationsRead(currentUser.id);
      await loadNotifications();
      await updateNotificationBadge();
    };

    function formatTime(d) {
      if (!d) return '—';
      var now = new Date();
      var date = new Date(d);
      var diff = now - date;
      
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    window.toggleMenu = function() { document.getElementById('nav-links').classList.toggle('open'); };
    document.addEventListener('click', function(e) { if (e.target.closest('.nav-links a')) document.getElementById('nav-links').classList.remove('open'); });

    (async function() {
      var user = await guardPage(['lab', 'designer', 'admin']);
      if (!user) return;
      currentUser = user;
      document.querySelectorAll('.user-name').forEach(function(el) { 
        el.textContent = user.user_metadata.full_name || user.email; 
      });
      
      await updateNotificationBadge();
      await loadNotifications();
      
      // Subscribe to new notifications
      subscribeToNotifications(user.id, function(newNotif) {
        loadNotifications();
        updateNotificationBadge();
      });
    })();
  </script>
</body>
</html>
